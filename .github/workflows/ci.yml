name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend linting & type checks ─────────────────────────────────────────
  backend-lint:
    name: Backend – Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy types-passlib

      - name: Ruff lint
        run: ruff check app/ --output-format=github

      - name: Ruff format check
        run: ruff format app/ --check

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-strict-optional

  # ── Backend unit tests ─────────────────────────────────────────────────────
  backend-test:
    name: Backend – Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key
          ADMIN_PASSWORD: testadmin
          ENVIRONMENT: testing
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found – skipping"

  # ── Docker build check ─────────────────────────────────────────────────────
  docker-build:
    name: Docker – Build Check
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: stefetni-tek-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend static checks ─────────────────────────────────────────────────
  frontend-check:
    name: Frontend – Static Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for JS syntax errors
        run: |
          sudo apt-get install -y nodejs -qq
          echo "Checking JS files..."
          find frontend/src -name "*.js" | while read f; do
            node --check "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Check HTML files exist
        run: |
          for f in frontend/index.html frontend/admin.html frontend/participant.html frontend/photographer.html frontend/route.html; do
            [ -f "$f" ] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done
