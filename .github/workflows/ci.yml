name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend linting & type checks ─────────────────────────────────────────
  backend-lint:
    name: Backend – Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy types-passlib

      - name: Ruff lint
        run: ruff check app/ --output-format=github

      - name: Ruff format check
        run: ruff format app/ --check

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-strict-optional

  # ── Backend unit tests ─────────────────────────────────────────────────────
  backend-test:
    name: Backend – Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key
          ADMIN_PASSWORD: testadmin
          ENVIRONMENT: testing
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found – skipping"

  # ── Docker build check ─────────────────────────────────────────────────────
  docker-build:
    name: Docker – Build Check
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: stefetni-tek-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend static checks ─────────────────────────────────────────────────
  frontend-check:
    name: Frontend – Static Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for JS syntax errors
        run: |
          sudo apt-get install -y nodejs -qq
          echo "Checking JS files..."
          find frontend/src -name "*.js" | while read f; do
            node --check "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Check HTML files exist
        run: |
          for f in frontend/index.html frontend/admin.html frontend/participant.html frontend/photographer.html frontend/route.html; do
            [ -f "$f" ] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

  # ── Mobile checks ───────────────────────────────────────────────────────────
  mobile-check:
    name: Mobile – Capacitor Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Validate required plugins in package.json
        working-directory: mobile
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            const required = [
              '@capacitor/core', '@capacitor/android', '@capacitor/ios', '@capacitor/cli',
              '@capacitor/geolocation', '@capacitor/local-notifications', '@capacitor/preferences',
              '@capacitor/clipboard', '@capacitor/app', '@capacitor/status-bar',
              '@capacitor/splash-screen', '@capacitor-community/bluetooth-le'
            ];
            const missing = required.filter(p => !deps[p]);
            if (missing.length) { console.error('Missing plugins:', missing); process.exit(1); }
            console.log('All required plugins present.');
          "

      - name: Check native.js syntax
        run: node --check frontend/src/utils/native.js

      - name: Check capacitor.config.ts syntax
        run: npx tsc --noEmit --allowJs --checkJs false --moduleResolution node --target es2020 --module commonjs capacitor.config.ts
        working-directory: mobile

  # ── Android build ───────────────────────────────────────────────────────────
  android-build:
    name: Android – Debug APK
    runs-on: ubuntu-latest
    needs: mobile-check
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Create www symlink
        run: node scripts/symlink.js
        working-directory: mobile

      - name: Capacitor sync android
        run: npx cap sync android
        working-directory: mobile

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: mobile/android

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

