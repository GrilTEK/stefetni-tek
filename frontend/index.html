<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podnebni Štafetni Tek – ŠCPET</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/lib/leaflet.css"/>
<style>
  /* ---- Theme variables ---- */
  :root {
    --green: #22c55e; --green-dark: #16a34a;
    --bg: #0a0f0d; --surface: #111a14; --surface2: #192218;
    --border: #2a3d2f; --text: #e8f5ea; --muted: #6b8f72;
    --panel-bg: rgba(10,15,13,0.92);
    --header-grad: rgba(10,15,13,0.95);
  }
  [data-theme="light"] {
    --bg: #f0f7f2; --surface: #ffffff; --surface2: #e8f5ea;
    --border: #c8e6d0; --text: #0f2a14; --muted: #5a8462;
    --panel-bg: rgba(240,247,242,0.95);
    --header-grad: rgba(240,247,242,0.97);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.3s, color 0.3s;
  }

  #map { position: absolute; inset: 0; z-index: 1; }

  /* Header bar */
  #header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(180deg, var(--header-grad) 0%, rgba(10,15,13,0) 100%);
    pointer-events: none;
  }
  #header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--green);
  }
  #header .subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
  #header-right { display: flex; align-items: center; gap: 10px; pointer-events: auto; }
  #ws-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.7rem; color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* Theme toggle button */
  #theme-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 9px; cursor: pointer;
    font-size: 1rem; line-height: 1; transition: background 0.2s;
  }
  #theme-btn:hover { background: var(--surface2); }

  /* Groups sidebar */
  #sidebar {
    position: absolute; right: 0; top: 0; bottom: 0; z-index: 10;
    width: 280px; background: var(--panel-bg);
    backdrop-filter: blur(12px); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    transform: translateX(280px); transition: transform 0.3s ease, background 0.3s;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-toggle {
    position: absolute; right: 0; top: 50%; z-index: 11;
    transform: translateY(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-right: none; border-radius: 8px 0 0 8px;
    padding: 12px 8px; cursor: pointer; color: var(--green); font-size: 1rem;
    transition: background 0.2s;
  }
  #sidebar-toggle:hover { background: var(--surface2); }
  #sidebar-header {
    padding: 20px 16px 12px; border-bottom: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif; font-size: 1rem;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
  }
  #groups-list { flex: 1; overflow-y: auto; padding: 8px; }
  #groups-list::-webkit-scrollbar { width: 4px; }
  #groups-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .group-card {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s; user-select: none;
    display: flex; align-items: center; gap: 10px;
  }
  .group-card:hover { background: var(--surface2); border-color: var(--green); }
  .group-card.finished { opacity: 0.5; }
  .group-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .group-info { flex: 1; min-width: 0; }
  .group-name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .group-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .group-badge {
    font-size: 0.65rem; font-weight: 700; padding: 2px 6px;
    border-radius: 4px; white-space: nowrap;
  }
  .badge-running { background: rgba(34,197,94,0.2); color: var(--green); }
  .badge-waiting { background: rgba(107,143,114,0.15); color: var(--muted); }
  .badge-finished { background: rgba(59,130,246,0.2); color: #60a5fa; }

  /* Stats panel – left side, vertical */
  #stats-bar {
    position: absolute; top: 76px; left: 16px; z-index: 10;
    display: flex; flex-direction: column;
    background: var(--panel-bg); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; min-width: 96px;
    transition: background 0.3s, border-color 0.3s;
  }
  .stat { padding: 10px 16px; text-align: center; border-bottom: 1px solid var(--border); }
  .stat:last-child { border-bottom: none; }
  .stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--green); line-height: 1; }
  .stat-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

  /* Custom Leaflet marker */
  .group-marker {
    width: 32px; height: 32px; border-radius: 50%; border: 3px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 0.8rem; color: white; cursor: pointer;
    transition: transform 0.2s;
  }
  .group-marker:hover { transform: scale(1.2); }
  .group-marker.moving { animation: markerBounce 1s ease infinite alternate; }
  @keyframes markerBounce { from{transform:scale(1)} to{transform:scale(1.1)} }

  .leaflet-popup-content-wrapper {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; font-family: 'Space Grotesk', sans-serif;
  }
  .leaflet-popup-tip { background: var(--surface); }
  .popup-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
  .popup-meta { font-size: 0.75rem; color: var(--muted); }

  /* Team stats panel */
  #team-panel {
    position: absolute; bottom: 30px; left: 130px; z-index: 12; width: 280px;
    background: var(--panel-bg); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
    transform: translateY(calc(100% + 100px)); transition: transform 0.3s ease, background 0.3s;
    pointer-events: auto;
  }
  #team-panel.open { transform: translateY(0); }
  .tp-header {
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .tp-color { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .tp-title { flex: 1; font-weight: 700; font-size: 0.88rem; line-height: 1.2; }
  .tp-sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .tp-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 2px 4px; }
  .tp-close:hover { color: var(--text); }
  .tp-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .tp-stat { background: var(--panel-bg); padding: 10px 12px; text-align: center; }
  .tp-stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 900; color: var(--green); line-height: 1; }
  .tp-stat-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }

  @media (max-width: 600px) {
    #sidebar { width: 100vw; top: auto; height: 50vh; transform: translateY(100%); }
    #sidebar.open { transform: translateY(0); }
    #sidebar-toggle { top: auto; bottom: 80px; right: 12px; transform: none; border-radius: 8px; border: 1px solid var(--border); }
    #stats-bar { top: 76px; left: 12px; }
    #team-panel { left: 12px; right: 12px; width: auto; bottom: 12px; }
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="header">
  <div>
    <h1>🌿 Podnebni Štafetni Tek</h1>
    <div class="subtitle" id="event-name">ŠCPET Ljubljana</div>
  </div>
  <div id="header-right">
    <div id="ws-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Povezovanje...</span>
    </div>
    <button id="theme-btn" onclick="toggleTheme()" title="Preklopi temo">☀️</button>
  </div>
</div>

<!-- Stats panel – left side, vertical -->
<div id="stats-bar">
  <div class="stat"><div class="stat-val" id="stat-active">0</div><div class="stat-lbl">Aktivnih</div></div>
  <div class="stat"><div class="stat-val" id="stat-running">0</div><div class="stat-lbl">Tečejo</div></div>
  <div class="stat"><div class="stat-val" id="stat-finished">0</div><div class="stat-lbl">Končalo</div></div>
  <div class="stat"><div class="stat-val" id="stat-viewers">–</div><div class="stat-lbl">Gledalcev</div></div>
</div>

<div id="sidebar">
  <div id="sidebar-header">Skupine</div>
  <div id="groups-list"></div>
</div>

<button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<!-- Team stats panel -->
<div id="team-panel">
  <div class="tp-header">
    <div class="tp-color" id="tp-color"></div>
    <div class="tp-title-wrap">
      <div class="tp-title" id="tp-title"></div>
      <div class="tp-sub" id="tp-sub"></div>
    </div>
    <button class="tp-close" onclick="closeTeamPanel()">✕</button>
  </div>
  <div class="tp-stats">
    <div class="tp-stat"><div class="tp-stat-val" id="tp-elapsed">–</div><div class="tp-stat-lbl">Čas teka</div></div>
    <div class="tp-stat"><div class="tp-stat-val" id="tp-dist">–</div><div class="tp-stat-lbl">Razdalja</div></div>
    <div class="tp-stat"><div class="tp-stat-val" id="tp-members">–</div><div class="tp-stat-lbl">Članov</div></div>
    <div class="tp-stat"><div class="tp-stat-val" id="tp-gps">–</div><div class="tp-stat-lbl">Zadnje GPS</div></div>
  </div>
</div>

<script src="/lib/leaflet.js"></script>
<script src="/src/utils/shared.js?v=3"></script>
<script>
const { ReconnectingWS, formatElapsed, WS_BASE } = window.ST;

// ---- Theme ----
const TILE_DARK  = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
const TILE_LIGHT = "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
let currentTheme = localStorage.getItem("st_theme") || "dark";
let tileLayer = null;

function applyThemeClass(theme) {
  document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "");
  document.getElementById("theme-btn").textContent = theme === "light" ? "🌙" : "☀️";
}

function applyTheme(theme, updateTile = true) {
  currentTheme = theme;
  localStorage.setItem("st_theme", theme);
  applyThemeClass(theme);
  if (updateTile && tileLayer && map) {
    map.removeLayer(tileLayer);
    tileLayer = L.tileLayer(theme === "light" ? TILE_LIGHT : TILE_DARK, {
      attribution: "© OpenStreetMap © CARTO", maxZoom: 19,
    }).addTo(map);
  }
}

function toggleTheme() {
  applyTheme(currentTheme === "dark" ? "light" : "dark");
}

// Apply saved theme immediately (before map loads)
applyThemeClass(currentTheme);

// State
const groups = {};
const markers = {};
const trails = {};
let map, sidebarOpen = false, routeLayer = null, selectedGroupId = null;

// Init map
async function initMap() {
  const config = await fetch("/api/public/event").then(r => r.json()).catch(() => ({}));
  const centerLat = config.map_center_lat || 46.0569;
  const centerLng = config.map_center_lng || 14.5058;
  const zoom = config.map_zoom || 13;
  if (config.name) document.getElementById("event-name").textContent = config.name;

  map = L.map("map", { zoomControl: true, attributionControl: false }).setView([centerLat, centerLng], zoom);

  tileLayer = L.tileLayer(currentTheme === "light" ? TILE_LIGHT : TILE_DARK, {
    attribution: "© OpenStreetMap © CARTO", maxZoom: 19,
  }).addTo(map);

  // Draw route if available
  if (config.route_waypoints?.length > 1) {
    const pts = config.route_waypoints.map(w => [w.lat, w.lng]);
    routeLayer = L.polyline(pts, { color: "#22c55e", weight: 4, opacity: 0.6, dashArray: "8 6" }).addTo(map);
    config.route_waypoints.forEach(w => {
      if (w.name) L.circleMarker([w.lat, w.lng], { radius: 6, color: "#22c55e", fillOpacity: 1, fillColor: "#22c55e" })
        .bindTooltip(w.name, { permanent: false, direction: "top" }).addTo(map);
    });
  }
}

function createMarkerIcon(group) {
  const div = document.createElement("div");
  div.className = "group-marker" + (group.has_started && !group.has_finished ? " moving" : "");
  div.style.background = group.color || "#3b82f6";
  div.textContent = group.number;
  return L.divIcon({ html: div.outerHTML, className: "", iconSize: [32, 32], iconAnchor: [16, 16] });
}

function updateGroup(data) {
  const g = { ...(groups[data.id] || {}), ...data };
  groups[g.id] = g;

  // Only show started groups on the public map
  if (!g.has_started) {
    if (markers[g.id]) { markers[g.id].remove(); delete markers[g.id]; }
    renderSidebar(); updateStats();
    return;
  }

  // Update or create marker
  if (g.location?.lat && g.location?.lng) {
    const latlng = [g.location.lat, g.location.lng];
    if (markers[g.id]) {
      markers[g.id].setLatLng(latlng).setIcon(createMarkerIcon(g));
    } else {
      const m = L.marker(latlng, { icon: createMarkerIcon(g) }).addTo(map);
      m.on("click", () => showTeamPanel(g.id));
      markers[g.id] = m;
    }
    // Trail
    if (!trails[g.id]) trails[g.id] = L.polyline([], { color: g.color, weight: 2, opacity: 0.5 }).addTo(map);
    const pts = trails[g.id].getLatLngs();
    pts.push(latlng);
    if (pts.length > 100) pts.shift();
    trails[g.id].setLatLngs(pts);
  }

  if (selectedGroupId === g.id) refreshTeamPanel();
  renderSidebar();
  updateStats();
}

function renderSidebar() {
  const list = document.getElementById("groups-list");
  const sorted = Object.values(groups).filter(g => g.has_started).sort((a, b) => a.number - b.number);
  list.innerHTML = sorted.map(g => {
    let badge, bclass;
    if (g.has_finished) { badge = "✓ Končalo"; bclass = "badge-finished"; }
    else if (g.has_started) { badge = "● Teče"; bclass = "badge-running"; }
    else { badge = "○ Čaka"; bclass = "badge-waiting"; }
    const elapsedHtml = g.has_started && !g.has_finished
      ? ` · <span id="elapsed-${g.id}">${formatElapsed(g.started_at)}</span>`
      : g.has_finished && g.started_at ? ` · ${formatElapsed(g.started_at)} ✓` : "";
    return `<div class="group-card ${g.has_finished ? 'finished' : ''}" onclick="showTeamPanel(${g.id})">
      <div class="group-dot" style="background:${g.color}"></div>
      <div class="group-info">
        <div class="group-name">Skupina ${g.number} – ${g.name}</div>
        <div class="group-meta">${g.member_count} udeležencev${elapsedHtml}</div>
      </div>
      <span class="group-badge ${bclass}">${badge}</span>
    </div>`;
  }).join("");
}

function updateStats() {
  const all = Object.values(groups);
  document.getElementById("stat-active").textContent = all.filter(g => g.has_started).length;
  document.getElementById("stat-running").textContent = all.filter(g => g.has_started && !g.has_finished).length;
  document.getElementById("stat-finished").textContent = all.filter(g => g.has_finished).length;
}

function flyToGroup(groupId) {
  const m = markers[groupId];
  if (m) map.flyTo(m.getLatLng(), 16, { duration: 1 });
}

function trailDistStr(groupId) {
  const t = trails[groupId];
  if (!t) return "–";
  const pts = t.getLatLngs();
  if (pts.length < 2) return "–";
  let d = 0;
  for (let i = 1; i < pts.length; i++) d += pts[i-1].distanceTo(pts[i]);
  return d < 1000 ? Math.round(d) + "m" : (d / 1000).toFixed(2) + "km";
}

function showTeamPanel(groupId) {
  selectedGroupId = groupId;
  refreshTeamPanel();
  document.getElementById("team-panel").classList.add("open");
  flyToGroup(groupId);
  if (!sidebarOpen) { sidebarOpen = true; document.getElementById("sidebar").classList.add("open"); document.getElementById("sidebar-toggle").textContent = "✕"; }
}

function closeTeamPanel() {
  selectedGroupId = null;
  document.getElementById("team-panel").classList.remove("open");
}

function refreshTeamPanel() {
  const g = groups[selectedGroupId];
  if (!g) return;
  document.getElementById("tp-color").style.background = g.color;
  document.getElementById("tp-title").textContent = `Skupina ${g.number} – ${g.name}`;
  const statusTxt = g.has_finished ? "✓ Zaključeno" : "● Teče";
  document.getElementById("tp-sub").textContent = statusTxt;
  document.getElementById("tp-elapsed").textContent = g.started_at ? formatElapsed(g.started_at) : "–";
  document.getElementById("tp-dist").textContent = trailDistStr(selectedGroupId);
  document.getElementById("tp-members").textContent = g.member_count || "–";
  const loc = g.location;
  if (loc?.timestamp) {
    const ago = Math.round((Date.now() - new Date(loc.timestamp)) / 1000);
    document.getElementById("tp-gps").textContent = ago < 60 ? ago + "s" : Math.round(ago / 60) + "min";
  } else {
    document.getElementById("tp-gps").textContent = "–";
  }
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("open", sidebarOpen);
  document.getElementById("sidebar-toggle").textContent = sidebarOpen ? "✕" : "☰";
}

// WebSocket
function initWS() {
  new ReconnectingWS(
    `${WS_BASE}/ws/live`,
    (msg) => {
      if (msg.type === "full_state") {
        msg.groups?.forEach(g => {
          updateGroup(g);
          if (g.trail?.length > 1) {
            const pts = g.trail.map(p => [p.lat, p.lng]);
            if (trails[g.id]) trails[g.id].setLatLngs(pts);
            else trails[g.id] = L.polyline(pts, { color: g.color || '#3b82f6', weight: 2, opacity: 0.5 }).addTo(map);
          }
        });
      } else if (msg.type === "viewer_count") {
        document.getElementById("stat-viewers").textContent = msg.count;
      } else if (msg.type === "location_update") {
        if (groups[msg.group_id]) {
          groups[msg.group_id].location = { lat: msg.lat, lng: msg.lng, source: msg.source, timestamp: msg.timestamp };
          updateGroup(groups[msg.group_id]);
        }
      } else if (msg.type === "group_status") {
        if (groups[msg.group_id]) {
          Object.assign(groups[msg.group_id], msg);
          updateGroup(groups[msg.group_id]);
        }
      } else if (msg.type === "group_created" || msg.type === "group_updated") {
        updateGroup(msg.group);
      } else if (msg.type === "group_deleted") {
        delete groups[msg.group_id];
        if (markers[msg.group_id]) { markers[msg.group_id].remove(); delete markers[msg.group_id]; }
        if (trails[msg.group_id]) { trails[msg.group_id].remove(); delete trails[msg.group_id]; }
        renderSidebar(); updateStats();
      } else if (msg.type === "route_updated") {
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        if (msg.waypoints?.length > 1) {
          routeLayer = L.polyline(msg.waypoints.map(w => [w.lat, w.lng]), { color: "#22c55e", weight: 4, opacity: 0.6, dashArray: "8 6" }).addTo(map);
        }
      }
      document.getElementById("status-dot").classList.add("live");
      document.getElementById("status-text").textContent = "V živo";
    },
    () => {
      document.getElementById("status-dot").classList.add("live");
      document.getElementById("status-text").textContent = "V živo";
    },
    () => {
      document.getElementById("status-dot").classList.remove("live");
      document.getElementById("status-text").textContent = "Reconnecting...";
    }
  );
}

// Timer update every second
setInterval(() => {
  Object.values(groups).filter(g => g.has_started && !g.has_finished).forEach(g => {
    const sidebar = document.getElementById(`elapsed-${g.id}`);
    if (sidebar) sidebar.textContent = formatElapsed(g.started_at);
  });
  if (selectedGroupId) refreshTeamPanel();
}, 1000);

// Full data refresh every 2s (fallback for missed WS messages)
setInterval(async () => {
  try {
    const state = await fetch("/api/public/state").then(r => r.json());
    state.groups?.forEach(g => updateGroup(g));
  } catch {}
}, 2000);

(async () => {
  await initMap();
  initWS();
})();
</script>
</body>
</html>
